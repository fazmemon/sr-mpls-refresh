<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
  <title>IP → SR-TE — UCMP &amp; traffic steering — Faz</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
  <style>
    :root { --r-main-font-size: 32px; }
    .reveal { font-size: 26px; }
    .reveal h1 { font-size: 1.6em; color: #4ec9b0; }
    .reveal h2 { font-size: 1.3em; color: #4ec9b0; }
    .reveal h3 { font-size: 1.1em; color: #9cdcfe; }
    .reveal h4 { color: #dcdcaa; }
    .reveal section { text-align: left; padding-top: 0 !important; }
    .reveal section.center { text-align: center; }
    .reveal ul { display: block; }
    .reveal ul li { margin-bottom: 0.25em; line-height: 1.25; }
    .reveal pre { font-size: 0.55em; box-shadow: none; }
    .reveal pre code { padding: 12px; max-height: 500px; }
    .reveal code { background: #1e1e1e; padding: 2px 6px; border-radius: 3px; color: #ce9178; }
    .reveal table { font-size: 0.65em; margin: 0.5em 0; border-collapse: collapse; }
    .reveal table th, .reveal table td { padding: 3px 6px; border: 1px solid #444; vertical-align: top; }
    .reveal table th { background: #2d2d2d; color: #4ec9b0; }
    .reveal strong { color: #dcdcaa; }
    .reveal em { color: #9cdcfe; font-style: normal; }
    .reveal a { color: #569cd6; }
    .reveal blockquote { border-left: 4px solid #4ec9b0; padding-left: 12px; font-style: normal; }
    .tag { display: inline-block; padding: 2px 8px; margin: 2px; background: #264f78; color: #9cdcfe; border-radius: 4px; font-size: 0.7em; }
    .tag.warn { background: #6b3a1a; color: #ce9178; }
    .tag.ok { background: #1e4620; color: #b5cea8; }
    @media (max-width: 900px) {
      .reveal { font-size: 22px; }
      .reveal h1 { font-size: 1.4em; }
      .reveal h2 { font-size: 1.15em; }
      .reveal table { font-size: 0.55em; }
    }
  </style>
</head>
<body>
<div class="reveal">
<div class="slides">

<!-- ============ COVER ============ -->
<section class="center">
  <h1>IP &rarr; SR-TE</h1>
  <h3>UCMP &amp; traffic steering for a trading network &middot; over Arista</h3>
  <p style="margin-top:1.8em; color:#888;">The honest case for segment routing &mdash; where BGP stops being enough</p>
</section>

<!-- ============ UCMP vs STEERING ============ -->
<section>
  <h3>Two problems, not one: UCMP vs traffic steering</h3>
  <svg viewBox="0 0 1240 460" style="width: 96%; max-height: 540px; display:block; margin: 0 auto;" font-family="sans-serif">
    <!-- divider -->
    <line x1="620" y1="58" x2="620" y2="330" stroke="#555" stroke-width="2" stroke-dasharray="6 6"/>

    <!-- ===== LEFT: UCMP ===== -->
    <text x="320" y="50" text-anchor="middle" font-size="16" font-weight="600" fill="#9cd1ef">UCMP &mdash; use unequal links in proportion</text>
    <!-- fat top link A-B -->
    <line x1="150" y1="195" x2="320" y2="120" stroke="#5b9bd5" stroke-width="9"/>
    <line x1="320" y1="120" x2="490" y2="195" stroke="#5b9bd5" stroke-width="9"/>
    <!-- thin bottom link A-B -->
    <line x1="150" y1="195" x2="320" y2="270" stroke="#5b9bd5" stroke-width="3"/>
    <line x1="320" y1="270" x2="490" y2="195" stroke="#5b9bd5" stroke-width="3"/>
    <g font-size="13" text-anchor="middle">
      <rect x="282" y="100" width="76" height="20" rx="3" fill="#0c0c0c"/><text x="320" y="115" fill="#cfe3f5">400G &middot; 80%</text>
      <rect x="282" y="272" width="76" height="20" rx="3" fill="#0c0c0c"/><text x="320" y="287" fill="#cfe3f5">100G &middot; 20%</text>
    </g>
    <g font-size="16" font-weight="600" text-anchor="middle">
      <circle cx="150" cy="195" r="27" fill="#1f3a52" stroke="#9cd1ef" stroke-width="2.5"/><text x="150" y="201" fill="#fff">A</text>
      <circle cx="490" cy="195" r="27" fill="#1f3a52" stroke="#9cd1ef" stroke-width="2.5"/><text x="490" y="201" fill="#fff">B</text>
    </g>
    <text x="320" y="354" text-anchor="middle" font-size="14.5" fill="#9ada9a">&rarr; BGP DMZ-Link-Bandwidth</text>
    <text x="320" y="376" text-anchor="middle" font-size="13" fill="#888">plain IP, no SR &mdash; just weight the split</text>

    <!-- ===== RIGHT: steering ===== -->
    <text x="930" y="50" text-anchor="middle" font-size="16" font-weight="600" fill="#d9c08c">Traffic steering &mdash; pin a class to a path</text>
    <!-- low-latency path (red) -->
    <line x1="780" y1="195" x2="930" y2="118" stroke="#d97b7b" stroke-width="6"/>
    <line x1="930" y1="118" x2="1080" y2="195" stroke="#d97b7b" stroke-width="6"/>
    <!-- capacity path (green) -->
    <line x1="780" y1="195" x2="930" y2="272" stroke="#7ec97e" stroke-width="6"/>
    <line x1="930" y1="272" x2="1080" y2="195" stroke="#7ec97e" stroke-width="6"/>
    <g font-size="13" text-anchor="middle">
      <rect x="848" y="72" width="164" height="20" rx="3" fill="#0c0c0c"/><text x="930" y="87" fill="#e8a0a0">market-data &rarr; min-delay</text>
      <rect x="858" y="300" width="144" height="20" rx="3" fill="#0c0c0c"/><text x="930" y="315" fill="#9ada9a">bulk / backup &rarr; fat path</text>
    </g>
    <g font-size="16" font-weight="600" text-anchor="middle">
      <circle cx="780" cy="195" r="27" fill="#1f3a52" stroke="#9cd1ef" stroke-width="2.5"/><text x="780" y="201" fill="#fff">A</text>
      <circle cx="1080" cy="195" r="27" fill="#1f3a52" stroke="#9cd1ef" stroke-width="2.5"/><text x="1080" y="201" fill="#fff">B</text>
      <circle cx="930" cy="118" r="17" fill="#222" stroke="#ccc" stroke-width="1.5"/><text x="930" y="123" fill="#fff" font-size="12">P1</text>
      <circle cx="930" cy="272" r="17" fill="#222" stroke="#ccc" stroke-width="1.5"/><text x="930" y="277" fill="#fff" font-size="12">P2</text>
    </g>
    <text x="930" y="354" text-anchor="middle" font-size="14.5" fill="#e0973c">&rarr; SR-TE SID-list / Flex-Algo min-delay</text>
    <text x="930" y="376" text-anchor="middle" font-size="13" fill="#888">source-routed &mdash; BGP can't express this</text>

    <!-- punchline -->
    <rect x="120" y="400" width="1000" height="50" rx="6" fill="#14110a" stroke="#5a4d2a"/>
    <text x="620" y="420" text-anchor="middle" font-size="14" fill="#dcdcaa">They want both &mdash; and that's the tell. UCMP alone, DMZ-LB handles. Add steering and you need source-routed paths.</text>
    <text x="620" y="440" text-anchor="middle" font-size="14" fill="#cfe3f5">In a domain you own, one SR-TE policy gives engineered steering <tspan fill="#9ada9a">and</tspan> weighted (UCMP) candidates together &mdash; the case BGP can't make.</text>
  </svg>
</section>

<!-- ============ STAY ON OSPF — NO FORKLIFT ============ -->
<section>
  <h3>Stay on OSPF &mdash; SR rides it, no IGP forklift</h3>
  <svg viewBox="0 0 1240 470" style="width: 96%; max-height: 540px; display:block; margin: 0 auto;" font-family="sans-serif">
    <!-- divider -->
    <line x1="620" y1="60" x2="620" y2="350" stroke="#555" stroke-width="2" stroke-dasharray="6 6"/>

    <!-- ===== LEFT: the migration you avoid ===== -->
    <rect x="40" y="78" width="540" height="262" rx="8" fill="#1a0f0f" stroke="#5a2b2b" stroke-width="1.5"/>
    <text x="310" y="56" text-anchor="middle" font-size="17" font-weight="600" fill="#e09b9b">Migrate OSPF &rarr; IS-IS, worldwide</text>
    <text x="310" y="106" text-anchor="middle" font-size="13" fill="#9a6b6b">the expensive path &mdash; what someone else proposes</text>
    <g font-size="15.5" fill="#d9d9d9">
      <text x="74" y="150"><tspan fill="#d16b6b" font-weight="700">&#10007;</tspan>  Forklift every router's IGP</text>
      <text x="74" y="190"><tspan fill="#d16b6b" font-weight="700">&#10007;</tspan>  Retrain the whole ops team</text>
      <text x="74" y="230"><tspan fill="#d16b6b" font-weight="700">&#10007;</tspan>  Migration risk on a live trading floor</text>
      <text x="74" y="270"><tspan fill="#d16b6b" font-weight="700">&#10007;</tspan>  $$$ &mdash; "why are we paying for this?"</text>
    </g>
    <text x="310" y="316" text-anchor="middle" font-size="13.5" fill="#c89393">SR purity you're not being paid to chase</text>

    <!-- ===== RIGHT: run SR on the OSPF you have ===== -->
    <rect x="660" y="78" width="540" height="262" rx="8" fill="#0f1a0f" stroke="#2c4a2c" stroke-width="1.5"/>
    <text x="930" y="56" text-anchor="middle" font-size="17" font-weight="600" fill="#9ada9a">Run SR on the OSPF you have</text>
    <text x="930" y="106" text-anchor="middle" font-size="13" fill="#6b9a6b">Arista EOS &mdash; verified against the feature index</text>
    <g font-size="14.5" fill="#e6e6e6">
      <text x="690" y="146"><tspan fill="#7ec97e" font-weight="700">&#10003;</tspan>  Prefix-SID / Adj-SID &mdash; OSPF-SR <tspan fill="#888">(4.31.1F)</tspan></text>
      <text x="690" y="182"><tspan fill="#7ec97e" font-weight="700">&#10003;</tspan>  TI-LFA, sub-50 ms &mdash; OSPF-SR <tspan fill="#888">(4.33.1F)</tspan></text>
      <text x="690" y="218"><tspan fill="#7ec97e" font-weight="700">&#10003;</tspan>  SR-TE colour steering <tspan fill="#888">&mdash; IGP-agnostic</tspan></text>
      <text x="690" y="254"><tspan fill="#7ec97e" font-weight="700">&#10003;</tspan>  BGP-LS &mdash; controller / PCE feed</text>
      <text x="690" y="294"><tspan fill="#d9c08c" font-weight="700">&#10007;</tspan>  Flex-Algo &mdash; IS-IS only <tspan fill="#d9c08c">&rarr; use SR-TE colour</tspan></text>
    </g>
    <text x="930" y="330" text-anchor="middle" font-size="13" fill="#888">one feature lost &mdash; and steering doesn't need it</text>

    <!-- punchline -->
    <rect x="120" y="378" width="1000" height="68" rx="6" fill="#14110a" stroke="#5a4d2a"/>
    <text x="620" y="402" text-anchor="middle" font-size="14.5" fill="#dcdcaa">The migration is the spend you avoid &mdash; OSPF-SR costs a version check (EOS &ge; 4.33), not a re-architecture.</text>
    <text x="620" y="428" text-anchor="middle" font-size="14" fill="#cfe3f5">"IS-IS is the SR-native IGP" is true &mdash; and <tspan fill="#9ada9a">not worth a worldwide forklift nobody's funding.</tspan></text>
  </svg>
</section>

</div>
</div>
